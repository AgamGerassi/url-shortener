services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: url-shortener-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-urlshortener}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS:-3600}
      - WORKERS=${WORKERS:-2}
      - RATE_LIMIT_POST_PER_MINUTE=${RATE_LIMIT_POST_PER_MINUTE:-30}
      - RATE_LIMIT_GET_PER_MINUTE=${RATE_LIMIT_GET_PER_MINUTE:-200}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure:5
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp

  db:
    image: postgres:16-alpine
    container_name: url-shortener-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-urlshortener}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no --requirepass ${REDIS_PASSWORD:-redis}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
