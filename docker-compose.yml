services:
  # === API Service ===
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: url-shortener-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-urlshortener}
      - REDIS_URL=redis://redis:6379/0
      - BASE_URL=${BASE_URL:-http://localhost:8000}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - REDIS_TTL_SECONDS=${REDIS_TTL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    # Security: read-only filesystem
    read_only: true
    # Temp directory for Python cache etc.
    tmpfs:
      - /tmp

  # === PostgreSQL Database ===
  db:
    image: postgres:16-alpine
    container_name: url-shortener-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-urlshortener}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-urlshortener}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # === Redis Cache ===
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
